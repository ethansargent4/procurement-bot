<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Procurement Bot Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://esm.sh/reactflow@11.11.3/dist/style.css" />
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">
<div id="root">Loading dashboard…</div>
<script type="text/babel" data-type="module" data-presets="env,react">
import React, { useEffect, useState, useMemo } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import ReactFlow, { Background, Controls, MiniMap } from 'https://esm.sh/reactflow@11.11.3?deps=react@18.3.1,react-dom@18.3.1';

const API = '/api';
const key = new URLSearchParams(location.search).get('key') || '';
const fetchJSON = async (path, opts = {}) => {
  const url = API + path + (path.includes('?') ? '&' : '?') + (key ? 'key=' + encodeURIComponent(key) : '');
  const r = await fetch(url, { headers: { 'content-type': 'application/json' }, ...opts });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
};
const post = (path, body) => fetchJSON(path, { method: 'POST', body: body ? JSON.stringify(body) : undefined });

const STATUS_COLORS = {
  new: 'bg-slate-200 text-slate-800',
  researching: 'bg-blue-200 text-blue-900',
  outreach: 'bg-indigo-200 text-indigo-900',
  quoted: 'bg-purple-200 text-purple-900',
  pending_approval: 'bg-amber-200 text-amber-900',
  submitted: 'bg-cyan-200 text-cyan-900',
  won: 'bg-emerald-200 text-emerald-900',
  lost: 'bg-red-200 text-red-900',
  skipped: 'bg-gray-200 text-gray-600',
};

function Chip({ status }) {
  return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${STATUS_COLORS[status] || 'bg-gray-200'}`}>{status}</span>;
}

function App() {
  const [tab, setTab] = useState('opportunities');
  const [cfg, setCfg] = useState(null);
  useEffect(() => { fetchJSON('/config').then(setCfg).catch(console.error); }, []);

  const runAll = async () => {
    const r = await post('/run/all');
    alert('Pipeline run complete:\n' + JSON.stringify(r, null, 2));
  };

  return (
    <div className="max-w-7xl mx-auto p-6">
      <header className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold">Procurement Bot</h1>
          <p className="text-sm text-slate-500">SAM.gov → suppliers → quotes → bids → projects</p>
        </div>
        <div className="flex items-center gap-2">
          {cfg && (
            <div className="text-xs text-slate-500 mr-4">
              SAM {cfg.samKeyConfigured ? '✅' : '❌'} · Gmail {cfg.gmailConfigured ? '✅' : '❌'} · LLM {cfg.anthropicConfigured ? '✅' : '❌'} · Serper {cfg.serperConfigured ? '✅' : '❌'}
            </div>
          )}
          <button onClick={runAll} className="px-4 py-2 rounded-lg bg-slate-900 text-white text-sm font-medium hover:bg-slate-700">Run pipeline now</button>
        </div>
      </header>

      <nav className="flex gap-1 mb-4 border-b border-slate-200">
        {['opportunities', 'flowchart', 'approvals', 'projects'].map(t => (
          <button key={t} onClick={() => setTab(t)}
            className={`px-4 py-2 text-sm font-medium capitalize border-b-2 -mb-px ${tab === t ? 'border-slate-900 text-slate-900' : 'border-transparent text-slate-500 hover:text-slate-800'}`}>
            {t}
          </button>
        ))}
      </nav>

      {tab === 'opportunities' && <Opportunities />}
      {tab === 'flowchart' && <FlowchartTab />}
      {tab === 'approvals' && <Approvals />}
      {tab === 'projects' && <Projects />}
    </div>
  );
}

function Opportunities() {
  const [rows, setRows] = useState([]);
  const [selected, setSelected] = useState(null);
  const load = () => fetchJSON('/opportunities').then(setRows);
  useEffect(() => { load(); }, []);

  return (
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div className="lg:col-span-2 bg-white rounded-xl border border-slate-200 overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th className="text-left p-3">Title</th>
              <th className="text-left p-3">Agency</th>
              <th className="text-left p-3">NAICS</th>
              <th className="text-left p-3">Score</th>
              <th className="text-left p-3">Status</th>
            </tr>
          </thead>
          <tbody>
            {rows.map(r => (
              <tr key={r.id} onClick={() => fetchJSON('/opportunities/' + r.id).then(setSelected)}
                  className="border-t border-slate-100 hover:bg-slate-50 cursor-pointer">
                <td className="p-3 font-medium text-slate-800">{r.title}</td>
                <td className="p-3 text-slate-600">{r.agency || '—'}</td>
                <td className="p-3 text-slate-600">{r.naics || '—'}</td>
                <td className="p-3 text-slate-600">{(r.score * 100).toFixed(0)}%</td>
                <td className="p-3"><Chip status={r.status} /></td>
              </tr>
            ))}
            {rows.length === 0 && <tr><td colSpan={5} className="p-6 text-center text-slate-400">No opportunities yet — click "Run pipeline now".</td></tr>}
          </tbody>
        </table>
      </div>
      <div className="bg-white rounded-xl border border-slate-200 p-4 max-h-[80vh] overflow-auto">
        {selected ? <OpportunityDetail opp={selected} refresh={load} /> : <p className="text-slate-400 text-sm">Select an opportunity.</p>}
      </div>
    </div>
  );
}

function OpportunityDetail({ opp, refresh }) {
  return (
    <div className="space-y-3 text-sm">
      <h3 className="font-semibold text-base">{opp.title}</h3>
      <div className="text-xs text-slate-500">{opp.agency} · NAICS {opp.naics || '—'} · <Chip status={opp.status} /></div>
      {opp.link && <a href={opp.link} target="_blank" className="text-blue-600 hover:underline text-xs">Open on SAM.gov →</a>}
      <p className="text-slate-700 whitespace-pre-wrap">{(opp.description || '').slice(0, 500)}{opp.description && opp.description.length > 500 ? '…' : ''}</p>

      <div>
        <h4 className="font-medium mt-4 mb-1">Outreach</h4>
        {opp.outreach?.length ? (
          <ul className="space-y-1">
            {opp.outreach.map(o => (
              <li key={o.id} className="flex items-center justify-between">
                <span>{o.supplier_name}</span>
                <Chip status={o.status} />
              </li>
            ))}
          </ul>
        ) : <p className="text-slate-400 text-xs">No outreach yet.</p>}
      </div>

      <div>
        <h4 className="font-medium mt-4 mb-1">Quotes</h4>
        {opp.quotes?.length ? (
          <ul className="space-y-1">
            {opp.quotes.map(q => (
              <li key={q.id} className="text-xs">
                ${q.total_price || '?'} · {q.lead_time_days || '?'}d · {q.currency}
              </li>
            ))}
          </ul>
        ) : <p className="text-slate-400 text-xs">No quotes yet.</p>}
      </div>
    </div>
  );
}

function FlowchartTab() {
  const [opps, setOpps] = useState([]);
  const [outreach, setOutreach] = useState([]);
  useEffect(() => {
    Promise.all([fetchJSON('/opportunities'), fetchJSON('/outreach')]).then(([o, r]) => { setOpps(o); setOutreach(r); });
  }, []);

  const { nodes, edges } = useMemo(() => {
    const nodes = [];
    const edges = [];
    opps.slice(0, 25).forEach((opp, i) => {
      const x = 0;
      const y = i * 180;
      nodes.push({
        id: 'opp-' + opp.id,
        position: { x, y },
        data: { label: <div className="text-left"><div className="font-medium text-sm">{opp.title.slice(0, 40)}</div><div className="text-xs text-slate-500">{opp.status}</div></div> },
        style: { width: 260, background: '#fff', border: '1px solid #cbd5e1', borderRadius: 10, padding: 8 },
      });
      const related = outreach.filter(o => o.opportunity_id === opp.id);
      related.forEach((o, j) => {
        nodes.push({
          id: 'out-' + o.id,
          position: { x: 320 + j * 230, y },
          data: { label: <div className="text-left"><div className="text-xs font-medium">{o.supplier_name}</div><div className="text-[10px] text-slate-500">{o.status}</div></div> },
          style: { width: 200, background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: 8, padding: 6 },
        });
        edges.push({ id: `e-${opp.id}-${o.id}`, source: 'opp-' + opp.id, target: 'out-' + o.id, animated: o.status === 'sent' });
      });
    });
    return { nodes, edges };
  }, [opps, outreach]);

  return (
    <div className="bg-white rounded-xl border border-slate-200" style={{ height: '75vh' }}>
      <ReactFlow nodes={nodes} edges={edges} fitView>
        <Background />
        <Controls />
        <MiniMap />
      </ReactFlow>
    </div>
  );
}

function Approvals() {
  const [bids, setBids] = useState([]);
  const load = () => fetchJSON('/bids?status=pending_approval').then(setBids);
  useEffect(() => { load(); }, []);

  const act = async (id, action) => {
    await post(`/bids/${id}/${action}`);
    load();
  };

  return (
    <div className="space-y-4">
      {bids.length === 0 && <p className="text-slate-400">No bids waiting for approval.</p>}
      {bids.map(b => (
        <div key={b.id} className="bg-white rounded-xl border border-slate-200 p-4">
          <div className="flex items-start justify-between">
            <div>
              <div className="text-xs text-slate-500">Opportunity {b.opportunity_id}</div>
              <div className="text-lg font-semibold">Bid amount: ${Number(b.bid_amount).toLocaleString()}</div>
              <div className="text-xs text-slate-500">Margin: {b.margin_pct}%</div>
            </div>
            <div className="flex gap-2">
              <button onClick={() => act(b.id, 'approve')} className="px-3 py-1.5 rounded-lg bg-emerald-600 text-white text-sm">Approve</button>
              <button onClick={() => act(b.id, 'reject')} className="px-3 py-1.5 rounded-lg bg-red-500 text-white text-sm">Reject</button>
              <button onClick={() => act(b.id, 'mark-submitted')} className="px-3 py-1.5 rounded-lg bg-slate-700 text-white text-sm">Mark submitted</button>
              <button onClick={() => act(b.id, 'mark-won')} className="px-3 py-1.5 rounded-lg bg-indigo-600 text-white text-sm">Mark won</button>
            </div>
          </div>
          <pre className="mt-3 bg-slate-50 p-3 rounded text-xs whitespace-pre-wrap max-h-64 overflow-auto">{b.draft_text}</pre>
        </div>
      ))}
    </div>
  );
}

function Projects() {
  const [rows, setRows] = useState([]);
  useEffect(() => { fetchJSON('/projects').then(setRows); }, []);
  return (
    <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
      <table className="w-full text-sm">
        <thead className="bg-slate-50 text-slate-600 text-xs uppercase">
          <tr>
            <th className="text-left p-3">Title</th>
            <th className="text-left p-3">Award</th>
            <th className="text-left p-3">Status</th>
            <th className="text-left p-3">Notes</th>
          </tr>
        </thead>
        <tbody>
          {rows.map(p => (
            <tr key={p.id} className="border-t border-slate-100">
              <td className="p-3 font-medium">{p.title}</td>
              <td className="p-3">${Number(p.award_amount || 0).toLocaleString()}</td>
              <td className="p-3"><Chip status={p.status} /></td>
              <td className="p-3 text-slate-600">{p.notes || '—'}</td>
            </tr>
          ))}
          {rows.length === 0 && <tr><td colSpan={4} className="p-6 text-center text-slate-400">No won projects yet.</td></tr>}
        </tbody>
      </table>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
